name: Nightly evals

# Behavioral eval harness (M2 epic E1.4) — FREE tier only.
#
# This job is $0: it installs the acs plugin from the checkout and runs the
# deterministic free scenarios (gate behavior + SessionEnd cleanup) against the
# shipped build — a nightly smoke that `main` still installs and gates cleanly
# (the class of bug that blocked v0.1.0/v0.1.1 installs).
#
# The PAID tier (real `claude -p` sessions — `create_ticket_artifacts`,
# `resume_and_verify`, `skill_triggers`) is intentionally NOT run in CI: it
# costs money and is non-deterministic. Run it LOCALLY on demand instead:
#     python3 evals/run_evals.py --paid               # full suite
#     python3 evals/run_evals.py --only <name> --paid # one scenario
# See evals/README.md. (No `ANTHROPIC_API_KEY` secret is used by this workflow.)

on:
  schedule:
    - cron: "0 7 * * *"          # 07:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-evals
  cancel-in-progress: false

jobs:
  evals:
    name: Free eval smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install the CLI + the acs plugin from THIS checkout so the free tier
      # exercises the shipped build. continue-on-error: if install hiccups, the
      # harness falls back to the in-repo source tree and the free tier still runs.
      - name: Install claude CLI + acs plugin (from checkout)
        continue-on-error: true
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version
          claude plugin marketplace add "$GITHUB_WORKSPACE"
          claude plugin install acs@gms-marketplace
          claude plugin list

      - name: Free-tier evals (deterministic, no API key)
        run: python3 evals/run_evals.py
