name: Marketplace release

# Tags and publishes a release for the MARKETPLACE CATALOG itself — distinct
# from the per-plugin Release workflow (release.yml). The marketplace "version"
# is the catalog manifest version: it does NOT gate plugin updates (each
# plugin's own plugin.json version does that). A marketplace release simply
# captures a coordinated snapshot — "catalog vX bundles acs vA, foo vB" — at one
# commit, so a frozen channel can pin to it.
#
# To cut a marketplace release:
#   1. Bump the top-level "version" in .claude-plugin/marketplace.json.
#   2. Merge to main. This workflow reads that version and, if tag
#      marketplace-v<version> does not yet exist, creates an annotated tag plus a
#      GitHub release whose notes enumerate every bundled plugin and the version
#      its plugin.json declares at this commit. If the tag exists, it skips.
#
# Consumers pin a frozen channel by adding the marketplace at this tag:
#   /plugin marketplace add globalmindsolutions/gms-marketplace@marketplace-v0.1.0
# Each plugin pins its own source ref (acs -> git-subdir at its v<plugin> tag),
# so the bundle is reproducible regardless of which marketplace commit is
# fetched, and each plugin stays individually updatable from its remote source.

on:
  push:
    branches: [main]
    paths:
      - .claude-plugin/marketplace.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag & publish marketplace catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so all existing tags are visible

      - name: Read marketplace version
        id: version
        run: |
          VERSION="$(python3 -c 'import json; m=json.load(open(".claude-plugin/marketplace.json")); print(m.get("version") or (m.get("metadata") or {}).get("version") or "")')"
          if [ -z "${VERSION}" ]; then
            echo "::error::.claude-plugin/marketplace.json has no top-level \"version\" (or metadata.version)."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Marketplace version: ${VERSION}"

      - name: Read marketplace title
        id: title
        run: |
          # Human-readable label for the release title. Prefer an explicit
          # displayName, else owner name + "Marketplace", else the catalog name.
          TITLE="$(python3 -c "import json; m=json.load(open('.claude-plugin/marketplace.json')); print(m.get('displayName') or ((m.get('owner') or {}).get('name','') + ' Marketplace').strip() or m['name'])")"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "Release title: ${TITLE}"

      - name: Check whether tag already exists
        id: tag
        run: |
          TAG="marketplace-v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" > /dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist — releasing."
          fi

      - name: Build bundle release notes
        if: steps.tag.outputs.exists == 'false'
        run: |
          python3 - <<'EOF'
          import json
          import os

          mkt = json.load(open(".claude-plugin/marketplace.json"))
          version = mkt.get("version") or (mkt.get("metadata") or {}).get("version")
          plugin_root = (mkt.get("metadata") or {}).get("pluginRoot")

          lines = [
              f"Catalog `{mkt['name']}` v{version} bundles the following plugins "
              "at this commit:",
              "",
          ]
          for entry in mkt.get("plugins", []):
              name = entry.get("name", "?")
              src = entry.get("source")
              shown = entry.get("version")
              detail = ""
              if isinstance(src, str):
                  rel = src
                  if plugin_root and not rel.startswith(("./", "/")):
                      rel = os.path.join(plugin_root, rel)
                  manifest = os.path.join(rel, ".claude-plugin", "plugin.json")
                  detail = f"`{src}`"
                  if os.path.exists(manifest):
                      shown = json.load(open(manifest)).get("version") or shown
              elif isinstance(src, dict):
                  loc = src.get("repo") or src.get("url") or src.get("package") or ""
                  ref = src.get("sha") or src.get("ref")
                  detail = f"{src.get('source')} `{loc}`" + (f" @ `{ref}`" if ref else "")
              lines.append(f"- **{name}** {shown or '(commit SHA)'} — {detail}")

          notes = "\n".join(lines).rstrip() + "\n"
          with open("marketplace-release-notes.md", "w", encoding="utf-8") as fh:
              fh.write(notes)
          print(notes)
          EOF

      - name: Create annotated tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          TAG="marketplace-v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${{ steps.title.outputs.title }} v${{ steps.version.outputs.version }}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="marketplace-v${{ steps.version.outputs.version }}"
          gh release create "${TAG}" \
            --title "${{ steps.title.outputs.title }} v${{ steps.version.outputs.version }}" \
            --notes-file marketplace-release-notes.md
