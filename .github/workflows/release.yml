name: Release

# Automated semver releases for the acs plugin. To ship a release:
#   1. Bump "version" in plugins/acs/.claude-plugin/plugin.json following semver:
#      MAJOR for breaking changes to skills/hooks/state contracts, MINOR for new
#      backwards-compatible capability, PATCH for backwards-compatible fixes.
#   2. In .claude-plugin/marketplace.json: bump the top-level "version" (CI
#      requires it — it cuts the marketplace-v<version> tag consumers pin to,
#      see marketplace-release.yml) AND update the acs plugin "source.ref" to
#      "v<version>" so the catalog serves the new release. acs is sourced via
#      git-subdir pinned to its plugin tag, so it is fetched remotely and is
#      individually updatable in /plugin. The v<version> tag is created by this
#      same push, so the ref resolves once this workflow finishes.
#   3. Add a matching "## [<version>] - YYYY-MM-DD" section to
#      plugins/acs/CHANGELOG.md (move entries out of [Unreleased]).
#   4. Merge to main. This workflow reads the version, and if tag v<version>
#      does not exist yet, creates an annotated tag and a GitHub release whose
#      notes are that changelog section. If the tag exists, it skips gracefully.

on:
  push:
    branches: [main]
    paths:
      - plugins/acs/.claude-plugin/plugin.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so all existing tags are visible

      - name: Read plugin version
        id: version
        run: |
          MANIFEST="plugins/acs/.claude-plugin/plugin.json"
          VERSION="$(python3 -c "import json; print(json.load(open('${MANIFEST}'))['version'])")"
          # Prefer the human-readable displayName for the release title; fall back
          # to name if displayName is absent.
          TITLE="$(python3 -c "import json; m=json.load(open('${MANIFEST}')); print(m.get('displayName') or m['name'])")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "Plugin version: ${VERSION}"
          echo "Release title: ${TITLE}"

      - name: Check whether tag already exists
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" > /dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist — releasing."
          fi

      - name: Extract changelog section
        if: steps.tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'EOF'
          import os
          import re
          import sys

          version = os.environ["VERSION"]
          with open("plugins/acs/CHANGELOG.md", encoding="utf-8") as fh:
              text = fh.read()
          pattern = rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)"
          match = re.search(pattern, text, re.M | re.S)
          if not match:
              sys.exit(
                  f"No '## [{version}]' section found in plugins/acs/CHANGELOG.md — "
                  "add one before releasing (semver discipline: version bump + "
                  "changelog section ship together)."
              )
          # Drop Keep-a-Changelog link-reference definitions from the notes.
          lines = [
              line for line in match.group(1).splitlines()
              if not re.match(r"^\[[^\]]+\]:\s*\S", line)
          ]
          notes = "\n".join(lines).strip() + "\n"
          with open("release-notes.md", "w", encoding="utf-8") as fh:
              fh.write(notes)
          print(f"Release notes for v{version}:\n{notes}")
          EOF

      - name: Create annotated tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${{ steps.version.outputs.title }} ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "${TAG}" \
            --title "${{ steps.version.outputs.title }} ${TAG}" \
            --notes-file release-notes.md
