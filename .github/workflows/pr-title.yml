# Enforce acs-style PR titles on this repo's own PRs: `[PREFIX-N] Title`
# (e.g. [MAR-12] Add bulk import). Non-ticket PRs escape via the `acs-exempt`
# label or an allowlisted branch prefix.
#
# NOTE ON ENFORCEMENT: this repo is a private repo on a free GitHub plan, where
# required status checks / branch protection / rulesets are unavailable. So this
# check is ADVISORY — it shows a ❌ on a non-conforming PR but cannot block the
# merge button. To make it a true gate, make the repo public (free, unlocks
# branch protection + rulesets) or move to GitHub Pro/Team, then mark
# "PR title convention" a required status check on `main`.
name: PR title

# pull_request_target runs the workflow from `main`, so it covers every open PR
# without each branch needing to carry this file. It is SAFE here because the
# job only reads event metadata (title/labels/branch) and never checks out or
# executes PR head code.
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  title:
    name: PR title convention
    runs-on: ubuntu-latest
    steps:
      - name: Check acs-style PR title
        # Payload reaches the script via env (never interpolated into the shell),
        # so a crafted title/label cannot inject commands.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          python3 - <<'PY'
          import fnmatch, json, os, re, sys

          EXEMPT_LABEL = "acs-exempt"
          EXEMPT_BRANCHES = ["release/*", "dependabot/*", "renovate/*"]
          # acs-style ticket id: an uppercase prefix + number, e.g. MAR-12, GMS-3.
          PATTERN = re.compile(r"^\[[A-Z][A-Z0-9]*-\d+\] .+")

          title = (os.environ.get("PR_TITLE") or "").strip()
          branch = (os.environ.get("PR_BRANCH") or "").strip()
          try:
              labels = [str(x) for x in json.loads(os.environ.get("PR_LABELS") or "[]")]
          except json.JSONDecodeError:
              labels = []

          if EXEMPT_LABEL in labels:
              print("exempt: '%s' label present — skipping." % EXEMPT_LABEL)
              sys.exit(0)
          for pat in EXEMPT_BRANCHES:
              if fnmatch.fnmatch(branch, pat):
                  print("exempt: branch '%s' matches '%s' — skipping." % (branch, pat))
                  sys.exit(0)

          if PATTERN.match(title):
              print("OK: %r" % title)
              sys.exit(0)

          print("::error title=PR title::%r must be acs-style '[PREFIX-N] Title' "
                "(e.g. [MAR-12] Add bulk import). For a legitimate non-ticket PR, "
                "add the '%s' label." % (title, EXEMPT_LABEL))
          sys.exit(1)
          PY
