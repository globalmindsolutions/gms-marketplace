# Pre-commit hooks for autonomous-coding-skills
# Install once per clone:  pre-commit install
# Run on all files:        pre-commit run --all-files
repos:
  # Secret scanning — blocks commits containing credentials/keys/tokens
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # General hygiene / footguns
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key          # catches PEM/SSH private keys
      - id: check-added-large-files      # blocks accidental large blobs
        args: ["--maxkb=5000"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict         # blocks unresolved conflict markers
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending

  # acs behavioral evals — FREE tier only (deterministic, $0, no `claude`).
  # Runs the gate + SessionEnd smoke against the source being committed when the
  # plugin or the harness changes. The paid tier (real `claude -p` sessions) is
  # never run here — run it locally on demand: `python3 evals/run_evals.py --paid`.
  - repo: local
    hooks:
      - id: acs-free-evals
        name: acs free evals (gate + cleanup smoke)
        entry: env ACS_EVAL_SOURCE=1 python3 evals/run_evals.py
        language: system
        pass_filenames: false
        files: ^(evals/|plugins/acs/)

      # acs convention hooks — validate branch/commit against committed formats.*
      # (honour enforcement.checks.* toggles + exempt label/branches).
      - id: acs-commit-msg
        name: acs commit message convention
        entry: python3 .acs/ci/check-conventions.py --mode commit-msg --message-file
        language: system
        stages: [commit-msg]
        pass_filenames: true       # pre-commit appends the message-file path
        always_run: true
      - id: acs-pre-push
        name: acs branch + commit conventions
        entry: python3 .acs/ci/check-conventions.py --mode pre-push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
